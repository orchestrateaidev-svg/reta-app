<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e7c6b" />
    <meta name="description" content="Private, offline-first companion for a doctor-supervised GLP-1 program." />
    <title>Retatrutide Companion</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('reta.theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
